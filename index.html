<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --border: #1e293b;
    --accent: #00d4ff; --accent2: #0080ff; --text: #e2e8f0; --muted: #64748b;
    --user-bubble: #1e3a5f; --ai-bubble: #0f1f2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace;
         display: flex; flex-direction: column; height: 100vh; }

  header { padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; background: var(--surface); }
  .pulse { width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
           animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.4)} 50%{box-shadow:0 0 0 8px rgba(0,212,255,0)} }
  h1 { font-size: 1.1rem; letter-spacing: .15em; color: var(--accent); }
  .status { margin-left: auto; font-size: .75rem; color: var(--muted); }

  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: .9rem;
          line-height: 1.6; border: 1px solid var(--border); }
  .msg.user { background: var(--user-bubble); align-self: flex-end; border-color: var(--accent2); }
  .msg.assistant { background: var(--ai-bubble); align-self: flex-start; }
  .msg .label { font-size: .7rem; color: var(--muted); margin-bottom: 4px; letter-spacing: .1em; }

  footer { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface);
            display: flex; gap: 10px; }
  #input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); padding: 12px 16px; font-family: inherit; font-size: .9rem;
            outline: none; transition: border-color .2s; }
  #input:focus { border-color: var(--accent); }
  button { background: var(--accent2); color: #fff; border: none; border-radius: 8px;
            padding: 12px 20px; cursor: pointer; font-family: inherit; font-size: .85rem;
            letter-spacing: .05em; transition: background .2s; }
  button:hover { background: var(--accent); }
  #resetBtn { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  #resetBtn:hover { border-color: #ef4444; color: #ef4444; background: transparent; }
</style>
</head>
<body>
<header>
  <div class="pulse"></div>
  <h1>J.A.R.V.I.S</h1>
  <span class="status" id="status">Online</span>
</header>

<div id="chat">
  <div class="msg assistant">
    <div class="label">JARVIS</div>
    Good day. I am online and ready to assist. How may I help you?
  </div>
</div>

<footer>
  <input id="input" type="text" placeholder="Ask JARVIS anything..." autofocus>
  <button onclick="sendMessage()">Send</button>
  <button id="resetBtn" onclick="resetChat()">Reset</button>
</footer>

<script>
const socket = io();
const chat   = document.getElementById("chat");
const input  = document.getElementById("input");
const status = document.getElementById("status");

socket.on("connect",    () => { status.textContent = "Online";  status.style.color = "#22c55e"; });
socket.on("disconnect", () => { status.textContent = "Offline"; status.style.color = "#ef4444"; });

socket.on("new_message", data => addMessage(data.role, data.text));

input.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="label">${role === "user" ? "YOU" : "JARVIS"}</div>${escHtml(text)}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function escHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  addMessage("user", msg);

  const res  = await fetch("/api/chat", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({message: msg})
  });
  const data = await res.json();
  if (!data.reply) addMessage("assistant", "I'm sorry, I didn't catch that.");
}

async function resetChat() {
  await fetch("/api/reset", {method:"POST"});
  chat.innerHTML = `<div class="msg assistant"><div class="label">JARVIS</div>Conversation reset. How may I assist you?</div>`;
}
</script>
</body>
</html>
